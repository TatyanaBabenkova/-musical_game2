<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ЗвероБэнд</title>
    <style>
        :root {
            --bg-color: #f1f5f9; --text-color: #1e293b; --card-bg: #ffffff;
            --inactive-opacity: 0.2; --color-kick: #ef4444; --color-cymbal: #eab308;
            --color-guitar: #3b82f6; --color-trumpet: #a855f7; --color-synth: #10b981;
        }
        * { box-sizing: border-box; touch-action: manipulation; }
        body { margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, sans-serif; background-color: var(--bg-color); color: var(--text-color); display: flex; flex-direction: column; height: 100dvh; overflow: hidden; }
        
        /* ЭКРАН 1 */
        #screen-start { 
            display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; 
            text-align: center; background: url('img/bg.png') no-repeat center center/cover; padding: 20px; 
            position: relative;
        }
        #screen-start::before { content: ''; position: absolute; top:0; left:0; width:100%; height:100%; background: rgba(255,255,255,0.7); z-index: 1; }
        .start-content { position: relative; z-index: 2; display: flex; flex-direction: column; align-items: center; }

        .start-header h1 { font-size: 32px; font-weight: 900; color: #3b82f6; margin: 0 0 5px 0; }
        .start-header h2 { font-size: 18px; font-weight: 600; color: #64748b; margin: 0 0 10px 0; }
        .start-header p { font-size: 14px; color: #94a3b8; max-width: 350px; margin: 0 auto 20px auto; line-height: 1.4; }
        
        .hero-showcase { 
            width: 250px; height: 250px; margin: 15px; background: rgba(248,250,252, 0.9); 
            border-radius: 45px; border: 4px solid #e2e8f0; display: flex; align-items: center; justify-content: center;
            box-shadow: 0 12px 30px rgba(0,0,0,0.06);
        }
        .hero-showcase img { width: 95%; height: 95%; object-fit: contain; }
        
        .btn-start { background: #3b82f6; color: white; border: none; padding: 18px 60px; border-radius: 40px; font-size: 22px; font-weight: 900; cursor: pointer; box-shadow: 0 8px 20px rgba(59, 130, 246, 0.3); }
        .carousel-wrap { display: flex; align-items: center; gap: 15px; }
        .nav-btn { background: rgba(241,245,249,0.9); border: none; border-radius: 50%; width: 45px; height: 45px; font-size: 22px; color: #3b82f6; cursor: pointer; display:flex; align-items:center; justify-content:center; }

        /* ЭКРАН 2 */
        #screen-game { display: none; flex-direction: column; height: 100%; padding: 10px; }
        .presets-carousel { display: flex; overflow-x: auto; gap: 8px; padding-bottom: 8px; flex: 0 0 auto; scrollbar-width: none; border-radius: 20px; }
        .preset-btn { flex: 0 0 auto; padding: 10px 16px; border-radius: 20px; background: var(--card-bg); border: 2px solid #e2e8f0; font-weight: 800; font-size: 12px; cursor: pointer; }
        .top-controls { display: flex; justify-content: space-between; gap: 8px; margin-bottom: 8px; flex-shrink: 0; border-radius: 18px; }
        .btn-play { background: #10b981; color: white; border: none; flex: 1; border-radius: 18px; font-weight: 900; font-size: 16px; height: 46px; cursor: pointer; transition: background 0.2s;}
        .btn-play.playing { background: #ef4444; }
        .btn-icon { width: 46px; height: 46px; background: #e2e8f0; border: none; border-radius: 15px; font-size: 20px; cursor: pointer; display: flex; align-items: center; justify-content: center; }

        .grid-wrap { flex: 1; display: flex; flex-direction: column; overflow: auto; padding: 5px 0; border-radius: 10px; background: rgba(255,255,255,0.3); }
        .grid-section { display: flex; flex-direction: column; min-width: max-content; padding-left: 5px; }
        .grid-row { display: flex; gap: 3px; margin-bottom: 2px; }
        
        .cell-label { 
            position: sticky; left: 0; z-index: 5; width: 45px; height: 32px; display: flex; align-items: center; justify-content: center; 
            font-size: 10px; font-weight: 900; color: #64748b; background: #f1f5f9; border-radius: 6px; margin-right: 5px; border: 1px solid #e2e8f0;
        }
        
        .cell { width: 40px; height: 32px; background: white; border-radius: 6px; border: 1px solid #e2e8f0; cursor: pointer; flex-shrink: 0; }
        .cell-rhythm { height: 42px; border: 2px dashed #cbd5e1; border-radius: 10px; }
        .playhead-col { background: #cbd5e1 !important; border-color: #94a3b8; }
        .tact-gap { margin-left: 12px !important; }

        /* ПАНЕЛЬ ИНСТРУМЕНТОВ */
        .bottom-stage { background: white; padding: 12px; border-radius: 25px 25px 0 0; box-shadow: 0 -5px 20px rgba(0,0,0,0.05); flex-shrink: 0; }
        .instrument-palette { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; }
        .inst-btn { flex: 0 0 calc(33.333% - 10px); max-width: 140px; border: 3px solid transparent; background: #f1f5f9; border-radius: 20px; padding: 8px; display: flex; flex-direction: column; align-items: center; cursor: pointer; transition: 0.2s; }
        .inst-img { width: 60px; height: 60px; object-fit: contain; }

        .inst-btn.selected { background: #ffffff !important; transform: scale(1.05); box-shadow: 0 8px 20px rgba(0,0,0,0.1); }
        .inst-btn-guitar.selected { border-color: var(--color-guitar) !important; }
        .inst-btn-trumpet.selected { border-color: var(--color-trumpet) !important; }
        .inst-btn-synth.selected { border-color: var(--color-synth) !important; }
        .inst-btn-kick.selected { border-color: var(--color-kick) !important; }
        .inst-btn-cymbals.selected { border-color: var(--color-cymbal) !important; }
        
        /* АДАПТИВ */
        @media (max-width: 600px) {
            .hero-showcase { width: 200px; height: 200px; }
            .bottom-stage { padding: 10px; padding-bottom: calc(10px + env(safe-area-inset-bottom)); border-radius: 20px 20px 0 0; }
            .instrument-palette { gap: 5px; } 
            .inst-btn { flex: 0 0 calc(33.33% - 5px); max-width: 115px; border-radius: 16px; padding: 4px; } 
            .inst-img { width: 80px; height: 80px; } 
            .cell { width: 34px; height: 28px; }
            .cell-label { width: 36px; font-size: 8px; }
            .start-header h1 { font-size: 26px; }
            .btn-start { padding: 16px 40px; font-size: 20px; }
        }
        @media (min-width: 800px) {
            .inst-btn { flex: 0 0 160px; max-width: 180px; border-radius: 30px; padding: 15px; }
            .inst-img { width: 130px; height: 130px; }
        }
        
        .settings-menu { display: none; position: absolute; top: 120px; right: 10px; background: white; padding: 15px; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.15); border: 2px solid #e2e8f0; z-index: 100; flex-direction: column; gap: 10px; }
        @keyframes bounce { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.1) translateY(-6px); } }
        .bounce { animation: bounce 0.2s ease; }

        /* ОБУЧАЛКА И КАСТОМНЫЕ МОДАЛЬНЫЕ ОКНА */
        #tour-overlay, #custom-confirm-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(15, 23, 42, 0.75); z-index: 1999; backdrop-filter: blur(2px); }
        
        #tour-box { display: none; background: white; padding: 25px; border-radius: 25px; text-align: center; width: 90%; max-width: 320px; position: fixed; left: 50%; transform: translateX(-50%); z-index: 2001; box-shadow: 0 20px 40px rgba(0,0,0,0.4); border: 2px solid #e2e8f0; transition: top 0.3s, bottom 0.3s, transform 0.3s; }
        
        #custom-confirm-box { display: none; flex-direction: column; background: white; padding: 25px; border-radius: 25px; text-align: center; width: 90%; max-width: 320px; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 2001; box-shadow: 0 20px 40px rgba(0,0,0,0.4); border: 2px solid #e2e8f0; }

        /* ИСПРАВЛЕННАЯ ПОДСВЕТКА (Только тень, без заливки фона) */
        .tour-highlight { position: relative; z-index: 2000 !important; box-shadow: 0 0 0 6px white, 0 0 25px 10px #3b82f6 !important; border-radius: inherit; pointer-events: none; }
    </style>
</head>
<body>
    <div id="screen-start">
        <div class="start-content">
            <div class="start-header">
                <h1>ЗвероБэнд 🎸</h1>
                <h2>Создай свой первый хит!</h2>
                <p>Выбирай музыканта, расставляй ноты в клеточки и слушай результат.</p>
            </div>
            <div class="carousel-wrap">
                <button class="nav-btn" onclick="changeHero(-1)">❮</button>
                <div class="hero-showcase"><img id="startImg" src=""></div>
                <button class="nav-btn" onclick="changeHero(1)">❯</button>
            </div>
            <h2 id="heroName" style="margin: 5px 0;"></h2>
            <p id="heroDesc" style="color:#64748b; margin-bottom:15px;"></p>
            <button class="btn-start" onclick="startGame()">НАЧАТЬ ИГРУ</button>
        </div>
    </div>

    <div id="screen-game">
        <div class="presets-carousel" id="presets-container">
            <button class="preset-btn" onclick="requestPresetLoad('yolochka')">🎄 Ёлочка</button>
            <button class="preset-btn" onclick="requestPresetLoad('kuznechik')">🦗 Кузнечик</button>
            <button class="preset-btn" onclick="requestPresetLoad('twinkle')">⭐ Звездочка</button>
            <button class="preset-btn" onclick="requestPresetLoad('dance')">🪩 Клуб</button>
            <button class="preset-btn" onclick="requestPresetLoad('rock')">🤘 Рок</button>
            <button class="preset-btn" onclick="requestPresetLoad('ufo')">🛸 НЛО</button>
            <button class="preset-btn" onclick="requestPresetLoad('train')">🚂 Паровоз</button>
            <button class="preset-btn" onclick="requestPresetLoad('chizhik')">🐦 Чижик</button>
            <button class="preset-btn" onclick="requestPresetLoad('gusi')">🦢 Гуси</button>
            <button class="preset-btn" onclick="requestPresetLoad('pop')">🌟 Каравай </button>
        </div>
        <div class="top-controls" id="tour-controls">
            <button class="btn-icon" onclick="goHome()" title="На главную">🏠</button>
            <button class="btn-play" id="btnPlay" onclick="togglePlay()">▶ ИГРАТЬ</button>
            <button class="btn-icon" onclick="exportWav()" title="Сохранить">💾</button>
            <button class="btn-icon" onclick="toggleSettings()" title="Настройки">⚙️</button>
            <button class="btn-icon" onclick="requestClearGrid()" title="Очистить">🗑️</button>
        </div>
        <div class="settings-menu" id="settingsMenu">
            <label>Длина: <select id="stepSelect" onchange="changeSteps(this.value)"><option value="16">16 шагов</option><option value="32">32 шага</option></select></label>
            <label>Скорость: <input type="range" min="60" max="200" value="120" oninput="changeTempo(this.value)"><span id="bpmDisplay">120</span></label>
        </div>
        <div class="grid-wrap" id="tour-grid">
            <div id="melGrid" class="grid-section"></div>
            <div style="height:4px; background:#cbd5e1; min-width:100%; margin:6px 0; border-radius:2px;"></div>
            <div id="rhyGrid" class="grid-section"></div>
        </div>
        <div class="bottom-stage" id="tour-palette"><div id="palette" class="instrument-palette"></div></div>
    </div>

    <div id="tour-overlay"></div>
    <div id="tour-box">
        <h2 id="tour-title" style="margin-top:0; color:#1e293b;"></h2>
        <p id="tour-text" style="color:#64748b; font-weight:600; line-height:1.4;"></p>
        <div style="display:flex; justify-content:space-between; margin-top:20px;">
            <button onclick="endTour()" style="background:none; border:none; color:#94a3b8; font-weight:bold; cursor:pointer;">Закрыть</button>
            <button onclick="nextTourStep()" style="background:#3b82f6; color:white; border:none; padding:10px 25px; border-radius:15px; font-weight:bold; cursor:pointer;">Далее ❯</button>
        </div>
    </div>

    <div id="custom-confirm-overlay"></div>
    <div id="custom-confirm-box">
        <h2 id="confirm-title" style="margin-top:0; color:#1e293b; font-size: 22px;">Внимание!</h2>
        <p id="confirm-text" style="color:#64748b; font-weight:600; line-height:1.4; margin-bottom:20px;"></p>
        <div style="display:flex; gap:10px;">
            <button onclick="closeConfirm()" style="flex:1; background:#f1f5f9; color:#64748b; border:none; padding:12px; border-radius:15px; font-weight:bold; cursor:pointer;">Отмена</button>
            <button onclick="executeConfirm()" style="flex:1; background:#ef4444; color:white; border:none; padding:12px; border-radius:15px; font-weight:bold; cursor:pointer;">Да, удалить</button>
        </div>
    </div>

    <script>
        const HEROES = [
            {id:'cat', name:'Кошечка', desc:'Поп-звезда!'}, 
            {id:'dog', name:'Щенок', desc:'Панк-рокер!'},
            {id:'bear', name:'Мишка', desc:'Хип-хоп диджей!'}, 
            {id:'fox', name:'Лисичка', desc:'Джаз и фанк!'}
        ];
        const INSTS = {
            guitar: {id:'guitar', type:'mel', color:'#3b82f6', file:'guitar_base.wav'},
            trumpet: {id:'trumpet', type:'mel', color:'#a855f7', file:'trumpet_base.wav'},
            synth: {id:'synth', type:'mel', color:'#10b981', file:'synth_base.wav'},
            kick: {id:'kick', type:'rhy', color:'#ef4444', file:'kick.wav'},
            cymbals: {id:'cymbals', type:'rhy', color:'#eab308', file:'cymbal.wav'}
        };
        const NOTES = ["СИ", "ЛЯ", "СОЛЬ", "ФА", "МИ", "РЕ", "ДО"];
       // const RATES = [1.888, 1.682, 1.498, 1.335, 1.26, 1.122, 1.0];
        const RATES = [1.8877, 1.6818, 1.4983, 1.3348, 1.2599, 1.1225, 1.0];
        
        let state = { hero: 0, inst: 'guitar', grid: {}, rhy: {}, playing: false, step: 0, tempo: 120, steps: 16 };
        let hasUnsavedChanges = false;
        let confirmAction = null; // Для хранения действия в модальном окне

        let audioCtx = null;
        let masterCompressor = null;
        let buffers = {}, activeNodes = {};

        function initLocal() {
            try {
                const saved = localStorage.getItem('zveroband-save');
                if(saved) {
                    const p = JSON.parse(saved);
                    if(p.hero !== undefined) state.hero = p.hero;
                    if(p.grid) state.grid = p.grid;
                    if(p.rhy) state.rhy = p.rhy;
                    if(p.steps) state.steps = p.steps;
                    if(p.tempo) state.tempo = p.tempo;
                    if(Object.keys(state.grid).length > 0 || Object.keys(state.rhy).length > 0) hasUnsavedChanges = true;
                }
            } catch(e) {}
            updateCarousel();
        }

        function saveLocal() {
            try {
                localStorage.setItem('zveroband-save', JSON.stringify({
                    grid: state.grid, rhy: state.rhy, steps: state.steps, tempo: state.tempo, hero: state.hero
                }));
            } catch(e) {}
        }

        function changeHero(dir) {
            state.hero = (state.hero + dir + HEROES.length) % HEROES.length;
            updateCarousel();
            saveLocal();
        }

        function updateCarousel() {
            document.getElementById('startImg').src = `img/${HEROES[state.hero].id}_base.png`;
            document.getElementById('heroName').innerText = HEROES[state.hero].name;
            document.getElementById('heroDesc').innerText = HEROES[state.hero].desc;
        }

        function goHome() {
            if(state.playing) togglePlay();
            document.getElementById('screen-game').style.display = 'none';
            document.getElementById('screen-start').style.display = 'flex';
        }

        async function startGame() {
            document.getElementById('screen-start').style.display = 'none';
            document.getElementById('screen-game').style.display = 'flex';
            
            if(!audioCtx) {
                const AudioContext = window.AudioContext || window.webkitAudioContext;
                audioCtx = new AudioContext();
                
                masterCompressor = audioCtx.createDynamicsCompressor();
                masterCompressor.threshold.setValueAtTime(-15, audioCtx.currentTime);
                masterCompressor.knee.setValueAtTime(30, audioCtx.currentTime);
                masterCompressor.ratio.setValueAtTime(12, audioCtx.currentTime);
                masterCompressor.attack.setValueAtTime(0.003, audioCtx.currentTime);
                masterCompressor.release.setValueAtTime(0.25, audioCtx.currentTime);
                masterCompressor.connect(audioCtx.destination);
                
                Object.keys(INSTS).forEach(k => {
                    fetch(`sounds/${INSTS[k].file}`).then(r => r.arrayBuffer()).then(ab => audioCtx.decodeAudioData(ab, b => buffers[k] = b)).catch(() => {});
                });
            }
            
            if (audioCtx.state === 'suspended') await audioCtx.resume();
            
            renderGame();
            selectInstrument('guitar');
            changeTempo(state.tempo);
            document.getElementById('stepSelect').value = state.steps;
            
            checkTour(); 
        }

        function renderGame() {
            const mel = document.getElementById('melGrid'), rhy = document.getElementById('rhyGrid');
            mel.innerHTML = rhy.innerHTML = '';
            for(let r=0; r<7; r++) {
                const row = document.createElement('div'); row.className = 'grid-row';
                const label = document.createElement('div'); label.className = 'cell-label'; label.innerText = NOTES[r]; row.appendChild(label);
                
                for(let c=0; c<state.steps; c++) {
                    const cell = document.createElement('div'); cell.className = 'cell'; cell.id = `m-${c}-${r}`;
                    if(c % 4 === 0 && c !== 0) cell.classList.add('tact-gap');
                    cell.onclick = () => { if(!state.playing && INSTS[state.inst].type === 'mel') toggleCell(c, r, 'mel'); };
                    if(state.grid[c] && state.grid[c][r]) cell.style.background = INSTS[state.grid[c][r]].color;
                    row.appendChild(cell);
                }
                mel.appendChild(row);
            }
            
            const rRow = document.createElement('div'); rRow.className = 'grid-row';
            const rLabel = document.createElement('div'); rLabel.className = 'cell-label'; rLabel.innerText = "РИТМ"; rRow.appendChild(rLabel);
            
            for(let c=0; c<state.steps; c++) {
                const cell = document.createElement('div'); cell.className = 'cell cell-rhythm'; cell.id = `r-${c}`;
                if(c % 4 === 0 && c !== 0) cell.classList.add('tact-gap');
                cell.onclick = () => { if(!state.playing && INSTS[state.inst].type === 'rhy') toggleCell(c, 0, 'rhy'); };
                if(state.rhy[c]) cell.style.background = INSTS[state.rhy[c]].color;
                rRow.appendChild(cell);
            }
            rhy.appendChild(rRow);
            renderPalette();
        }

        function renderPalette() {
            const p = document.getElementById('palette'); p.innerHTML = '';
            const h = HEROES[state.hero];
            Object.keys(INSTS).forEach(k => {
                const btn = document.createElement('button'); 
                btn.className = `inst-btn inst-btn-${k}`; btn.id = `btn-${k}`;
                if(state.inst === k && !state.playing) btn.classList.add('selected');
                btn.onclick = () => selectInstrument(k);
                const iconMap = {guitar:'guitar', trumpet:'trumpet', synth:'synth', kick:'drum', cymbals:'cymbals'};
                btn.innerHTML = `<img class="inst-img" src="img/${h.id}_${iconMap[k]}.png">`;
                p.appendChild(btn);
            });
        }

        function selectInstrument(id) {
            state.inst = id;
            document.querySelectorAll('.inst-btn').forEach(b => b.classList.remove('selected'));
            const active = document.getElementById(`btn-${id}`); if(active && !state.playing) active.classList.add('selected');
            document.getElementById('melGrid').style.opacity = INSTS[id].type === 'mel' ? 1 : 0.2;
            document.getElementById('rhyGrid').style.opacity = INSTS[id].type === 'rhy' ? 1 : 0.2;
            saveLocal();
        }

        function toggleCell(c, r, type) {
            const id = state.inst;
            if(type === 'mel') {
                state.grid[c] = state.grid[c] || {};
                if(state.grid[c][r]) { delete state.grid[c][r]; document.getElementById(`m-${c}-${r}`).style.background = ''; }
                else { state.grid[c][r] = id; document.getElementById(`m-${c}-${r}`).style.background = INSTS[id].color; playSound(id, RATES[r]); bounce(id); }
            } else {
                if(state.rhy[c]) { delete state.rhy[c]; document.getElementById(`r-${c}`).style.background = ''; }
                else { state.rhy[c] = id; document.getElementById(`r-${c}`).style.background = INSTS[id].color; playSound(id, 1); bounce(id); }
            }
            hasUnsavedChanges = true;
            saveLocal();
        }

        function playSound(k, r) {
            if(!audioCtx || !buffers[k]) return;
            const t = audioCtx.currentTime;
            if(activeNodes[k]) { try { activeNodes[k].stop(t+0.05); } catch(e){} }
            const s = audioCtx.createBufferSource(); s.buffer = buffers[k]; s.playbackRate.value = r;
            const g = audioCtx.createGain(); g.gain.setValueAtTime(0.5, t); g.gain.exponentialRampToValueAtTime(0.01, t + 0.5);
            s.connect(g); g.connect(masterCompressor); s.start(); activeNodes[k] = s;
        }

        function bounce(id) { const b = document.getElementById(`btn-${id}`); if(b) { b.classList.remove('bounce'); void b.offsetWidth; b.classList.add('bounce'); } }

        function togglePlay() {
            state.playing = !state.playing;
            const b = document.getElementById('btnPlay');
            if(state.playing) { 
                b.innerText = '■ СТОП'; b.classList.add('playing'); 
                document.querySelectorAll('.inst-btn').forEach(x => x.classList.remove('selected'));
                document.getElementById('melGrid').style.opacity = 1; document.getElementById('rhyGrid').style.opacity = 1;
                loop(); 
            } else { 
                b.innerText = '▶ ИГРАТЬ'; b.classList.remove('playing'); 
                clearTimeout(state.timer); state.step = 0; 
                document.querySelectorAll('.cell').forEach(x => x.classList.remove('playhead-col'));
                selectInstrument(state.inst || 'guitar'); 
            }
        }

        function loop() {
            if(!state.playing) return;
            document.querySelectorAll('.cell').forEach(x => x.classList.remove('playhead-col'));
            for(let r=0; r<7; r++) { const c = document.getElementById(`m-${state.step}-${r}`); if(c) c.classList.add('playhead-col'); }
            const rc = document.getElementById(`r-${state.step}`); if(rc) rc.classList.add('playhead-col');
            if(state.grid[state.step]) Object.keys(state.grid[state.step]).forEach(r => { const id = state.grid[state.step][r]; playSound(id, RATES[r]); bounce(id); });
            if(state.rhy[state.step]) { const id = state.rhy[state.step]; playSound(id, 1); bounce(id); }
            state.step = (state.step + 1) % state.steps;
            state.timer = setTimeout(loop, (60000/state.tempo)/4);
        }

        // --- ЛОГИКА КАСТОМНЫХ ОКОН ПОДТВЕРЖДЕНИЯ ---
        function showConfirm(title, text, action) {
            document.getElementById('confirm-title').innerText = title;
            document.getElementById('confirm-text').innerText = text;
            confirmAction = action;
            document.getElementById('custom-confirm-overlay').style.display = 'block';
            document.getElementById('custom-confirm-box').style.display = 'flex';
        }

        function closeConfirm() {
            document.getElementById('custom-confirm-overlay').style.display = 'none';
            document.getElementById('custom-confirm-box').style.display = 'none';
            confirmAction = null;
        }

        function executeConfirm() {
            if(confirmAction) confirmAction();
            closeConfirm();
        }

        function requestClearGrid() {
            if(Object.keys(state.grid).length === 0 && Object.keys(state.rhy).length === 0) return;
            if(hasUnsavedChanges) {
                showConfirm('Очистить поле?', 'Вся нарисованная тобой мелодия будет стёрта навсегда.', () => clearGrid());
                return;
            }
            clearGrid();
        }

        function clearGrid() { 
            state.grid = {}; state.rhy = {}; 
            hasUnsavedChanges = false; saveLocal(); renderGame(); 
        }

        function requestPresetLoad(type) {
            if(hasUnsavedChanges) {
                showConfirm('Загрузить хит?', 'Твой текущий шедевр пропадет, если ты загрузишь новую песню.', () => loadPreset(type));
                return;
            }
            loadPreset(type);
        }

        function loadPreset(type) {
            state.grid = {}; state.rhy = {};
            const draw = (c, r, inst, isRhy=false) => { if(!isRhy) { state.grid[c] = state.grid[c] || {}; state.grid[c][r] = inst; } else { state.rhy[c] = inst; } };
            
            if(type === 'yolochka') {
                state.steps = 32; state.tempo = 100;
                for(let i=0; i<32; i+=4) { draw(i, 0, 'kick', true); draw(i+2, 0, 'cymbals', true); }
                [[0,6],[2,1],[4,1],[6,2],[8,1],[10,3],[12,6],[14,6],[16,6],[18,1],[20,1],[22,2],[24,1],[26,1]].forEach(n => draw(n[0], n[1], 'trumpet'));
            } else if(type === 'kuznechik') {
                state.steps = 32; state.tempo = 140;
                for(let i=0; i<32; i+=4) {draw(i,0,'kick',true);     };
                [[0,1],[2,4],[4,1],[6,4],[8,1],[10,2],[12,2],[16,2],[18,4],[20,2],[22,4],[24,2],[26,1],[28,1]].forEach(n=>draw(n[0],n[1],'synth'));
            } else if(type === 'twinkle') {
                state.steps = 32; state.tempo = 90;
                for(let i=0; i<32; i+=4) { draw(i, 0, 'kick', true); draw(i+1, 0, 'cymbals', true); draw(i+2, 0, 'kick', true); draw(i+3, 0, 'cymbals', true); }
                [[0,6],[2,6],[4,2],[6,2],[8,1],[10,1],[12,2],[16,3],[18,3],[20,4],[22,4],[24,3],[26,2],[28,6]].forEach(n => draw(n[0], n[1], 'trumpet'));
            } else if(type === 'ufo') {
                state.steps = 16; state.tempo = 120;
                draw(0, 0, 'kick', true); draw(8, 0, 'kick', true);
                [[0,6],[1,5],[2,4],[3,3],[4,2],[8,6],[9,5],[10,4],[11,3],[12,2]].forEach(n => draw(n[0], n[1], 'synth'));
                [[0,0],[2,0],[4,0],[8,1],[10,1],[12,1]].forEach(n => draw(n[0], n[1], 'trumpet'));
            } else if(type === 'train') {
                state.steps = 16; state.tempo = 120;
                for(let i=0; i<16; i+=2) { draw(i, 0, 'kick', true); draw(i+1, 0, 'kick', true); }
                draw(0, 2, 'trumpet'); draw(1, 2, 'trumpet'); draw(8, 3, 'trumpet'); draw(9, 3, 'trumpet');
            } else if(type === 'rock') {
                state.steps = 16; state.tempo = 130;
                for(let i=0; i<16; i+=4) { draw(i, 0, 'kick', true); draw(i+2, 0, 'kick', true); draw(i+3, 0, 'cymbals', true); }
                [[0,4],[2,4],[4,4],[6,4],[8,4],[10,4],[12,4],[14,2],[16,6],[18,5],[20,4]].forEach(n => draw(n[0], n[1], 'guitar'));
            } else if(type === 'dance') {
                state.steps = 16; state.tempo = 128;
                for(let i=0; i<16; i+=4) draw(i, 0, 'kick', true);
                [[2,3],[6,3],[10,3],[14,3]].forEach(n => draw(n[0], n[1], 'synth'));
            } else if(type === 'chizhik') {
                state.steps = 32; state.tempo = 110;
                for(let i=0; i<32; i+=4) { draw(i, 0, 'cymbals', true); draw(i+2, 0, 'kick', true);}
                [[0,1],[2,3],[4,1],[6,3],[8,0],[10,1],[12,2],[16,6],[18,6],[20,6],[22,5],[24,4],[26,3],[28,3]].forEach(n => draw(n[0], n[1], 'synth'));
            } else if(type === 'gusi') {
                state.steps = 32; state.tempo = 120;
                [0,4,8,12,16,20,24,28].forEach(i => draw(i, 0, 'kick', true));
                [[0,3],[2,4],[4,5],[6,6],[8,2],[10,2],[16,3],[18,4],[20,5],[22,6],[24,2],[26,2]].forEach(n => draw(n[0], n[1], 'guitar'));
            } else if(type === 'pop') {
                state.steps = 32; state.tempo = 105;
                for(let i=0; i<32; i+=4) { draw(i, 0, 'kick', true); draw(i+4, 0, 'kick', true); }
                [[0,6],[2,6],[4,3],[6,3],[8,1],[10,1],[12,2],[14,2],[16,6],[18,6],[20,3],[22,3],[24,1],[26,1],[28,5]].forEach(n => draw(n[0], n[1], 'trumpet'));
            }

            hasUnsavedChanges = false; 
            renderGame(); changeTempo(state.tempo); document.getElementById('stepSelect').value = state.steps; saveLocal();
        }

        function toggleSettings() { const s = document.getElementById('settingsMenu'); s.style.display = s.style.display === 'flex' ? 'none' : 'flex'; }
        function changeSteps(v) { state.steps = parseInt(v); renderGame(); saveLocal(); }
        function changeTempo(v) { state.tempo = parseInt(v); document.getElementById('bpmDisplay').innerText = v; saveLocal(); }

        // --- ЛОГИКА ОБУЧЕНИЯ ---
        let tourStep = 0;
        function checkTour() {
            if(!localStorage.getItem('music-game-tour-completed')) {
                setTimeout(startTour, 500); 
            }
        }
        function startTour() {
            tourStep = 0;
            document.getElementById('tour-overlay').style.display = 'block';
            document.getElementById('tour-box').style.display = 'block';
            nextTourStep();
        }
        function nextTourStep() {
            document.querySelectorAll('.tour-highlight').forEach(el => el.classList.remove('tour-highlight'));
            const box = document.getElementById('tour-box');
            const title = document.getElementById('tour-title');
            const text = document.getElementById('tour-text');
            
            if(tourStep === 0) {
                title.innerText = 'Инструменты 🎸';
                text.innerText = 'Выбирай любой инструмент внизу экрана. Музыкальные ставятся наверх, а барабаны — вниз!';
                document.getElementById('palette').classList.add('tour-highlight');
                box.style.top = '15%'; box.style.bottom = 'auto'; box.style.transform = 'translateX(-50%)';
            } else if(tourStep === 1) {
                title.innerText = 'Ноты 🎵';
                text.innerText = 'Нажимай на клеточки, чтобы нарисовать свою мелодию. Таблица разделена на такты, чтобы было проще ловить ритм!';
                document.getElementById('tour-grid').classList.add('tour-highlight');
                box.style.top = 'auto'; box.style.bottom = '5%'; box.style.transform = 'translateX(-50%)';
            } else if(tourStep === 2) {
                title.innerText = 'Готовые хиты 🎧';
                text.innerText = 'Здесь можно выбрать уже готовую песню. Послушай, как они звучат, и попробуй изменить их!';
                document.getElementById('presets-container').classList.add('tour-highlight');
                box.style.top = '30%'; box.style.bottom = 'auto'; box.style.transform = 'translateX(-50%)';
            } else if(tourStep === 3) {
                title.innerText = 'Слушай и сохраняй! ▶️💾';
                text.innerText = 'Жми ИГРАТЬ, чтобы послушать результат. А если захочешь скачать трек на телефон — жми на дискету!';
                document.getElementById('tour-controls').classList.add('tour-highlight');
                box.style.top = '50%'; box.style.bottom = 'auto'; box.style.transform = 'translate(-50%, -50%)';
            } else {
                endTour();
                return;
            }
            tourStep++;
        }
        function endTour() {
            document.getElementById('tour-overlay').style.display = 'none';
            document.getElementById('tour-box').style.display = 'none';
            document.querySelectorAll('.tour-highlight').forEach(el => el.classList.remove('tour-highlight'));
            localStorage.setItem('music-game-tour-completed', '1');
        }

        async function exportWav() {
            if(!audioCtx) { alert("Сначала запустите игру!"); return; }
            const dur = 10, sr = 44100;
            const offline = new (window.OfflineAudioContext || window.webkitOfflineAudioContext)(2, sr * dur, sr);
            const offlineComp = offline.createDynamicsCompressor();
            offlineComp.threshold.setValueAtTime(-10, 0);
            offlineComp.connect(offline.destination);

            const stepDur = (60 / state.tempo) / 4;
            for(let sIdx=0; sIdx < state.steps * 4; sIdx++) {
                const time = sIdx * stepDur; if(time >= dur) break;
                const cur = sIdx % state.steps;
                if(state.grid[cur]) Object.keys(state.grid[cur]).forEach(r => {
                    const id = state.grid[cur][r]; if(buffers[id]) { const src = offline.createBufferSource(); src.buffer = buffers[id]; src.playbackRate.value = RATES[r]; src.connect(offlineComp); src.start(time); }
                });
                if(state.rhy[cur]) {
                    const id = state.rhy[cur]; if(buffers[id]) { const src = offline.createBufferSource(); src.buffer = buffers[id]; src.playbackRate.value = 1; src.connect(offlineComp); src.start(time); }
                }
            }
            const rendered = await offline.startRendering();
            const blob = audioBufferToWav(rendered);
            const link = document.createElement('a'); link.href = URL.createObjectURL(blob); link.download = 'ZveroBand.wav'; link.click();
        }

        function audioBufferToWav(buffer) {
            let n = buffer.numberOfChannels, sr = buffer.sampleRate, length = buffer.length * n * 2 + 44;
            let buffer2 = new ArrayBuffer(length), view = new DataView(buffer2);
            let pos = 0;
            const wS = (s) => { for (let i = 0; i < s.length; i++) view.setUint8(pos++, s.charCodeAt(i)); };
            const w32 = (d) => { view.setUint32(pos, d, true); pos += 4; };
            const w16 = (d) => { view.setUint16(pos, d, true); pos += 2; };
            wS('RIFF'); w32(length - 8); wS('WAVE'); wS('fmt '); w32(16); w16(1); w16(n); w32(sr); w32(sr * n * 2); w16(n * 2); w16(16); wS('data'); w32(length - 44);
            for (let i = 0; i < buffer.length; i++) for (let j = 0; j < n; j++) { let s = Math.max(-1, Math.min(1, buffer.getChannelData(j)[i])); view.setInt16(pos, s < 0 ? s * 0x8000 : s * 0x7FFF, true); pos += 2; }
            return new Blob([buffer2], {type: 'audio/wav'});
        }
        
        initLocal(); 
    </script>
