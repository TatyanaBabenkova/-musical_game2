<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ЗвероБэнд</title>
    <style>
        :root {
            --bg-color: #f1f5f9; --text-color: #1e293b; --card-bg: #ffffff;
            --inactive-opacity: 0.2; --color-kick: #ef4444; --color-cymbal: #eab308;
            --color-guitar: #3b82f6; --color-trumpet: #a855f7; --color-synth: #10b981;
        }
        * { box-sizing: border-box; touch-action: manipulation; }
        body {
            margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, sans-serif;
            background-color: var(--bg-color); color: var(--text-color);
            display: flex; flex-direction: column; height: 100dvh; overflow: hidden;
        }
        
        /* ЭКРАН 1: БОЛЬШИЕ КАРТИНКИ */
        #screen-start { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; text-align: center; background: white; }
        .hero-showcase { 
            width: 280px; height: 280px; margin: 20px; background: #f8fafc; 
            border-radius: 50px; border: 4px solid #e2e8f0; display: flex; align-items: center; justify-content: center;
            box-shadow: 0 15px 35px rgba(0,0,0,0.08);
        }
        .hero-showcase img { width: 95%; height: 95%; object-fit: contain; }
        .btn-start { background: #3b82f6; color: white; border: none; padding: 18px 60px; border-radius: 40px; font-size: 24px; font-weight: 900; cursor: pointer; box-shadow: 0 8px 20px rgba(59, 130, 246, 0.4); }
        .carousel-wrap { display: flex; align-items: center; gap: 20px; }
        .nav-btn { background: #f1f5f9; border: none; border-radius: 50%; width: 50px; height: 50px; font-size: 24px; color: #3b82f6; cursor: pointer; display: flex; align-items: center; justify-content: center; }

        /* ЭКРАН 2 */
        #screen-game { display: none; flex-direction: column; height: 100%; padding: 10px; }
        .top-controls { display: flex; justify-content: space-between; gap: 10px; margin-bottom: 10px; }
        .btn-play { background: #10b981; color: white; border: none; flex: 1; border-radius: 20px; font-weight: 900; font-size: 18px; cursor: pointer; }
        .btn-play.playing { background: #ef4444; }
        .btn-icon { width: 50px; height: 50px; background: #e2e8f0; border: none; border-radius: 15px; font-size: 22px; cursor: pointer; display: flex; align-items: center; justify-content: center; }

        .grid-wrap { flex: 1; display: flex; flex-direction: column; justify-content: center; overflow: auto; padding: 10px 0; }
        .grid-section { display: flex; flex-direction: column; align-items: center; }
        .grid-row { display: flex; gap: 4px; margin-bottom: 2px; }
        .cell { width: 42px; height: 34px; background: white; border-radius: 8px; border: 1px solid #e2e8f0; cursor: pointer; }
        .cell-label { width: 50px; height: 34px; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 900; color: #64748b; background: #f8fafc; border-radius: 8px; margin-right: 4px; }
        .cell-rhythm { height: 48px; border: 2px dashed #cbd5e1; border-radius: 14px; }
        .playhead-col { background: #cbd5e1 !important; }

        /* НИЖНЯЯ ПАНЕЛЬ С КРУПНЫМИ ЗВЕРЯТАМИ */
        .bottom-stage { background: white; padding: 15px; border-radius: 30px 30px 0 0; box-shadow: 0 -5px 25px rgba(0,0,0,0.05); }
        .instrument-palette { display: flex; flex-wrap: wrap; justify-content: center; gap: 12px; }
        .inst-btn { 
            flex: 0 0 calc(33% - 12px); max-width: 140px; border: 3px solid transparent; 
            background: #f1f5f9; border-radius: 24px; padding: 10px; display: flex; 
            flex-direction: column; align-items: center; cursor: pointer; transition: 0.2s;
        }
        .inst-btn.selected { background: white !important; border-color: #3b82f6 !important; transform: scale(1.08); box-shadow: 0 8px 20px rgba(0,0,0,0.1); }
        .inst-img { width: 70px; height: 70px; object-fit: contain; }
        
        @media (max-width: 600px) {
            .hero-showcase { width: 200px; height: 200px; }
            .inst-img { width: 50px; height: 50px; }
            .cell { width: 36px; height: 28px; }
            .cell-label { width: 38px; font-size: 9px; }
        }
        .settings-menu { display: none; position: absolute; top: 120px; right: 10px; background: white; padding: 15px; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.15); border: 2px solid #e2e8f0; z-index: 100; flex-direction: column; gap: 10px; }
        @keyframes bounce { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.15) translateY(-8px); } }
        .bounce { animation: bounce 0.25s ease; }
    </style>
</head>
<body>
    <div id="screen-start">
        <h1>ЗвероБэнд 🎸</h1>
        <div class="carousel-wrap">
            <button class="nav-btn" onclick="changeHero(-1)">❮</button>
            <div class="hero-showcase"><img id="startImg" src=""></div>
            <button class="nav-btn" onclick="changeHero(1)">❯</button>
        </div>
        <h2 id="heroName"></h2>
        <p id="heroDesc" style="color:#64748b; margin-top:-10px; margin-bottom:20px;"></p>
        <button class="btn-start" onclick="startGame()">НАЧАТЬ ИГРУ</button>
    </div>

    <div id="screen-game">
        <div class="presets-carousel" style="display:flex; overflow-x:auto; gap:8px; padding-bottom:10px; scrollbar-width:none;">
            <button class="preset-btn" onclick="loadPreset('yolochka')">🎄 Ёлочка</button>
            <button class="preset-btn" onclick="loadPreset('kuznechik')">🦗 Кузнечик</button>
            <button class="preset-btn" onclick="loadPreset('rock')">🤘 Рок</button>
            <button class="preset-btn" onclick="loadPreset('pop')">🌟 Попса</button>
            <button class="preset-btn" onclick="loadPreset('lullaby')">🌙 Сон</button>
        </div>
        <div class="top-controls">
            <button class="btn-play" id="btnPlay" onclick="togglePlay()">▶ ИГРАТЬ</button>
            <button class="btn-icon" onclick="exportWav()">💾</button>
            <button class="btn-icon" onclick="toggleSettings()">⚙️</button>
            <button class="btn-icon" onclick="clearGrid()">🗑️</button>
        </div>
        <div class="settings-menu" id="settingsMenu">
            <label>Длина: <select id="stepSelect" onchange="changeSteps(this.value)"><option value="16">16 шагов</option><option value="32">32 шага</option></select></label>
            <label>Скорость: <input type="range" min="60" max="200" value="120" oninput="changeTempo(this.value)"><span id="bpmDisplay">120</span></label>
        </div>
        <div class="grid-wrap">
            <div id="melGrid" class="grid-section"></div>
            <div style="height:6px; background:#cbd5e1; width:100%; max-width:800px; margin:8px 0; border-radius:4px;"></div>
            <div id="rhyGrid" class="grid-section"></div>
        </div>
        <div class="bottom-stage"><div id="palette" class="instrument-palette"></div></div>
    </div>

    <script>
        const HEROES = [
            {id:'cat', name:'Кошечка', desc:'Поп-звезда!'}, 
            {id:'dog', name:'Щенок', desc:'Панк-рокер!'},
            {id:'bear', name:'Мишка', desc:'Хип-хоп диджей!'}, 
            {id:'fox', name:'Лисичка', desc:'Джаз и фанк!'}
        ];
        const INSTS = {
            guitar: {id:'guitar', type:'mel', color:'#3b82f6', file:'guitar_base.wav'},
            trumpet: {id:'trumpet', type:'mel', color:'#a855f7', file:'trumpet_base.wav'},
            synth: {id:'synth', type:'mel', color:'#10b981', file:'synth_base.wav'},
            kick: {id:'kick', type:'rhy', color:'#ef4444', file:'kick.wav'},
            cymbals: {id:'cymbals', type:'rhy', color:'#eab308', file:'cymbal.wav'}
        };
        const NOTES = ["СИ", "ЛЯ", "СОЛЬ", "ФА", "МИ", "РЕ", "ДО"];
        const RATES = [1.88, 1.682, 1.498, 1.335, 1.26, 1.122, 1.0];
        let state = { hero: 0, inst: 'guitar', grid: {}, rhy: {}, playing: false, step: 0, tempo: 120, steps: 16 };
        let audioCtx = null, buffers = {}, activeNodes = {};

        function changeHero(dir) {
            state.hero = (state.hero + dir + HEROES.length) % HEROES.length;
            document.getElementById('startImg').src = `img/${HEROES[state.hero].id}_base.png`;
            document.getElementById('heroName').innerText = HEROES[state.hero].name;
            document.getElementById('heroDesc').innerText = HEROES[state.hero].desc;
        }

        async function startGame() {
            document.getElementById('screen-start').style.display = 'none';
            document.getElementById('screen-game').style.display = 'flex';
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') await audioCtx.resume();
            Object.keys(INSTS).forEach(k => {
                fetch(`sounds/${INSTS[k].file}`).then(r => r.arrayBuffer()).then(ab => audioCtx.decodeAudioData(ab, b => buffers[k] = b));
            });
            renderGame(); selectInstrument('guitar');
        }

        function renderGame() {
            const mel = document.getElementById('melGrid'), rhy = document.getElementById('rhyGrid');
            mel.innerHTML = rhy.innerHTML = '';
            for(let r=0; r<7; r++) {
                const row = document.createElement('div'); row.className = 'grid-row';
                const label = document.createElement('div'); label.className = 'cell-label'; label.innerText = NOTES[r]; row.appendChild(label);
                for(let c=0; c<state.steps; c++) {
                    const cell = document.createElement('div'); cell.className = 'cell'; cell.id = `m-${c}-${r}`;
                    cell.onclick = () => { if(!state.playing && INSTS[state.inst].type === 'mel') toggleCell(c, r, 'mel'); };
                    if(state.grid[c] && state.grid[c][r]) cell.style.background = INSTS[state.grid[c][r]].color;
                    row.appendChild(cell);
                }
                mel.appendChild(row);
            }
            const rRow = document.createElement('div'); rRow.className = 'grid-row';
            const rLabel = document.createElement('div'); rLabel.className = 'cell-label'; rLabel.innerText = "РИТМ"; rRow.appendChild(rLabel);
            for(let c=0; c<state.steps; c++) {
                const cell = document.createElement('div'); cell.className = 'cell cell-rhythm'; cell.id = `r-${c}`;
                cell.onclick = () => { if(!state.playing && INSTS[state.inst].type === 'rhy') toggleCell(c, 0, 'rhy'); };
                if(state.rhy[c]) cell.style.background = INSTS[state.rhy[c]].color;
                rRow.appendChild(cell);
            }
            rhy.appendChild(rRow);
            renderPalette();
        }

        function renderPalette() {
            const p = document.getElementById('palette'); p.innerHTML = '';
            const h = HEROES[state.hero];
            Object.keys(INSTS).forEach(k => {
                const btn = document.createElement('button'); btn.className = 'inst-btn'; btn.id = `btn-${k}`;
                if(state.inst === k && !state.playing) btn.classList.add('selected');
                btn.onclick = () => selectInstrument(k);
                const iconMap = {guitar:'guitar', trumpet:'trumpet', synth:'synth', kick:'drum', cymbals:'cymbals'};
                btn.innerHTML = `<img class="inst-img" src="img/${h.id}_${iconMap[k]}.png">`;
                p.appendChild(btn);
            });
        }

        function selectInstrument(id) {
            state.inst = id;
            document.querySelectorAll('.inst-btn').forEach(b => b.classList.remove('selected'));
            const active = document.getElementById(`btn-${id}`); if(active && !state.playing) active.classList.add('selected');
            document.getElementById('melGrid').style.opacity = INSTS[id].type === 'mel' ? 1 : 0.2;
            document.getElementById('rhyGrid').style.opacity = INSTS[id].type === 'rhy' ? 1 : 0.2;
        }

        function toggleCell(c, r, type) {
            const id = state.inst;
            if(type === 'mel') {
                state.grid[c] = state.grid[c] || {};
                if(state.grid[c][r]) { delete state.grid[c][r]; document.getElementById(`m-${c}-${r}`).style.background = ''; }
                else { state.grid[c][r] = id; document.getElementById(`m-${c}-${r}`).style.background = INSTS[id].color; playSound(id, RATES[r]); bounce(id); }
            } else {
                if(state.rhy[c]) { delete state.rhy[c]; document.getElementById(`r-${c}`).style.background = ''; }
                else { state.rhy[c] = id; document.getElementById(`r-${c}`).style.background = INSTS[id].color; playSound(id, 1); bounce(id); }
            }
        }

        function playSound(k, r) {
            if(!buffers[k]) return;
            const t = audioCtx.currentTime;
            if(activeNodes[k]) { try { activeNodes[k].stop(t+0.05); } catch(e){} }
            const s = audioCtx.createBufferSource(); s.buffer = buffers[k]; s.playbackRate.value = r;
            const g = audioCtx.createGain(); g.gain.setValueAtTime(0.7, t); g.gain.exponentialRampToValueAtTime(0.01, t + 0.4);
            s.connect(g); g.connect(audioCtx.destination); s.start(); activeNodes[k] = s;
        }

        function bounce(id) { const b = document.getElementById(`btn-${id}`); if(b) { b.classList.remove('bounce'); void b.offsetWidth; b.classList.add('bounce'); } }

        function togglePlay() {
            state.playing = !state.playing;
            const b = document.getElementById('btnPlay');
            if(state.playing) { b.innerText = '■ СТОП'; b.classList.add('playing'); document.querySelectorAll('.inst-btn').forEach(x => x.classList.remove('selected')); loop(); }
            else { b.innerText = '▶ ИГРАТЬ'; b.classList.remove('playing'); clearTimeout(state.timer); state.step = 0; document.querySelectorAll('.cell').forEach(x => x.classList.remove('playhead-col')); selectInstrument(state.inst); }
        }

        function loop() {
            if(!state.playing) return;
            document.querySelectorAll('.cell').forEach(x => x.classList.remove('playhead-col'));
            for(let r=0; r<7; r++) { const c = document.getElementById(`m-${state.step}-${r}`); if(c) c.classList.add('playhead-col'); }
            const rc = document.getElementById(`r-${state.step}`); if(rc) rc.classList.add('playhead-col');
            if(state.grid[state.step]) Object.keys(state.grid[state.step]).forEach(r => { const id = state.grid[state.step][r]; playSound(id, RATES[r]); bounce(id); });
            if(state.rhy[state.step]) { const id = state.rhy[state.step]; playSound(id, 1); bounce(id); }
            state.step = (state.step + 1) % state.steps;
            state.timer = setTimeout(loop, (60000/state.tempo)/4);
        }

        function clearGrid() { state.grid = {}; state.rhy = {}; renderGame(); }
        function toggleSettings() { const s = document.getElementById('settingsMenu'); s.style.display = s.style.display === 'flex' ? 'none' : 'flex'; }
        function changeSteps(v) { state.steps = parseInt(v); renderGame(); }
        function changeTempo(v) { state.tempo = parseInt(v); document.getElementById('bpmDisplay').innerText = v; }

        function loadPreset(type) {
            clearGrid();
            if(type === 'yolochka') {
                state.steps = 32; state.tempo = 100;
                [0,4,8,12,16,20,24,28].forEach(c => state.rhy[c] = 'kick');
                // СОЛЬ(2), МИ(4), МИ(4), ФА(3), МИ(4), РЕ(5), ДО(6), СОЛЬ(2)
                [[0,2],[2,4],[4,4],[6,3],[8,4],[10,5],[12,6],[14,2],[16,2],[18,1],[20,1],[22,3],[24,5],[26,4]].forEach(n => { state.grid[n[0]] = state.grid[n[0]] || {}; state.grid[n[0]][n[1]] = 'synth'; });
            } else if(type === 'kuznechik') {
                state.steps = 32; state.tempo = 150;
                for(let i=0; i<32; i+=2) state.rhy[i] = 'cymbals';
                [[0,1],[2,4],[4,1],[6,4],[8,1],[10,2],[12,2],[14,2],[16,4],[18,2],[20,4],[22,2],[24,1],[26,1]].forEach(n => { state.grid[n[0]] = state.grid[n[0]] || {}; state.grid[n[0]][n[1]] = 'guitar'; });
            }
            renderGame(); changeTempo(state.tempo); document.getElementById('stepSelect').value = state.steps;
        }

        async function exportWav() {
            if(Object.keys(buffers).length === 0) { alert("Звуки еще загружаются..."); return; }
            const dur = 10, sr = 44100;
            const offline = new (window.OfflineAudioContext || window.webkitOfflineAudioContext)(2, sr * dur, sr);
            const stepDur = (60 / state.tempo) / 4;
            for(let sIdx=0; sIdx < state.steps * 4; sIdx++) {
                const time = sIdx * stepDur; if(time >= dur) break;
                const cur = sIdx % state.steps;
                if(state.grid[cur]) Object.keys(state.grid[cur]).forEach(r => {
                    const id = state.grid[cur][r]; if(buffers[id]) { const src = offline.createBufferSource(); src.buffer = buffers[id]; src.playbackRate.value = RATES[r]; src.connect(offline.destination); src.start(time); }
                });
                if(state.rhy[cur]) {
                    const id = state.rhy[cur]; if(buffers[id]) { const src = offline.createBufferSource(); src.buffer = buffers[id]; src.connect(offline.destination); src.start(time); }
                }
            }
            const rendered = await offline.startRendering();
            const blob = audioBufferToWav(rendered);
            const link = document.createElement('a'); link.href = URL.createObjectURL(blob); link.download = 'ZveroBand.wav'; link.click();
        }

        function audioBufferToWav(buffer) {
            let n = buffer.numberOfChannels, sr = buffer.sampleRate, length = buffer.length * n * 2 + 44;
            let buffer2 = new ArrayBuffer(length), view = new DataView(buffer2);
            let pos = 0;
            const wS = (s) => { for (let i = 0; i < s.length; i++) view.setUint8(pos++, s.charCodeAt(i)); };
            const w32 = (d) => { view.setUint32(pos, d, true); pos += 4; };
            const w16 = (d) => { view.setUint16(pos, d, true); pos += 2; };
            wS('RIFF'); w32(length - 8); wS('WAVE'); wS('fmt '); w32(16); w16(1); w16(n); w32(sr); w32(sr * n * 2); w16(n * 2); w16(16); wS('data'); w32(length - 44);
            for (let i = 0; i < buffer.length; i++) for (let j = 0; j < n; j++) { let s = Math.max(-1, Math.min(1, buffer.getChannelData(j)[i])); view.setInt16(pos, s < 0 ? s * 0x8000 : s * 0x7FFF, true); pos += 2; }
            return new Blob([buffer2], {type: 'audio/wav'});
        }
        changeHero(0);
    </script>
</body>
</html>
