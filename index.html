<!DOCTYPE html>
<html lang="ru">

    <title>ЗвероБэнд</title>

        :root {

        body { margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, sans-serif; background-color: var(--bg-color); color: var(--text-color); display: flex; flex-direction: column; height: 100dvh; overflow: hidden; }
        
        /* ЭКРАН 1: С КАРТИНКОЙ BG.PNG И ОПИСАНИЕМ */
        #screen-start {

        .start-header h1 { font-size: 32px; font-weight: 900; color: #3b82f6; margin: 0 0 5px 0; }
        .start-header h2 { font-size: 18px; font-weight: 600; color: #64748b; margin: 0 0 10px 0; }
        .start-header p { font-size: 14px; color: #94a3b8; max-width: 350px; margin: 0 auto 20px auto; line-height: 1.4; }
        
        .hero-showcase { 
            width: 250px; height: 250px; margin: 15px; background: rgba(248,250,252, 0.9); 
            border-radius: 45px; border: 4px solid #e2e8f0; display: flex; align-items: center; justify-content: center;

        }
        .hero-showcase img { width: 95%; height: 95%; object-fit: contain; }
        
        .btn-start { background: #3b82f6; color: white; border: none; padding: 18px 60px; border-radius: 40px; font-size: 22px; font-weight: 900; cursor: pointer; box-shadow: 0 8px 20px rgba(59, 130, 246, 0.3); }
        .carousel-wrap { display: flex; align-items: center; gap: 15px; }
        .nav-btn { background: rgba(241,245,249,0.9); border: none; border-radius: 50%; width: 45px; height: 45px; font-size: 22px; color: #3b82f6; cursor: pointer; display:flex; align-items:center; justify-content:center; }

        #screen-game { display: none; flex-direction: column; height: 100%; padding: 10px; }
        .presets-carousel { display: flex; overflow-x: auto; gap: 8px; padding-bottom: 8px; flex: 0 0 auto; scrollbar-width: none; }
        .preset-btn { flex: 0 0 auto; padding: 10px 16px; border-radius: 20px; background: var(--card-bg); border: 2px solid #e2e8f0; font-weight: 800; font-size: 12px; cursor: pointer; }
        .top-controls { display: flex; justify-content: space-between; gap: 8px; margin-bottom: 8px; flex-shrink: 0; }
        .btn-play { background: #10b981; color: white; border: none; flex: 1; border-radius: 18px; font-weight: 900; font-size: 16px; height: 46px; cursor: pointer; }
        .btn-play.playing { background: #ef4444; }
        .btn-icon { width: 46px; height: 46px; background: #e2e8f0; border: none; border-radius: 15px; font-size: 20px; cursor: pointer; display: flex; align-items: center; justify-content: center; }

        .grid-wrap { 
            flex: 1; display: flex; flex-direction: column; overflow: auto; 
            padding: 5px 0; border-radius: 10px; background: rgba(255,255,255,0.3);
        }
        .grid-section { display: flex; flex-direction: column; min-width: max-content; padding-left: 5px; }
        .grid-row { display: flex; gap: 3px; margin-bottom: 2px; }
        
        .cell-label { 
            position: sticky; left: 0; z-index: 5;
            width: 45px; height: 32px; display: flex; align-items: center; justify-content: center; 
            font-size: 10px; font-weight: 900; color: #64748b; background: #f1f5f9; 
            border-radius: 6px; margin-right: 5px; border: 1px solid #e2e8f0;
        }
        
        .cell { width: 40px; height: 32px; background: white; border-radius: 6px; border: 1px solid #e2e8f0; cursor: pointer; flex-shrink: 0; }
        .cell-rhythm { height: 42px; border: 2px dashed #cbd5e1; border-radius: 10px; }
        .playhead-col { background: #cbd5e1 !important; border-color: #94a3b8; }

        /* ПАНЕЛЬ ИНСТРУМЕНТОВ */
        .bottom-stage { background: white; padding: 12px; border-radius: 25px 25px 0 0; box-shadow: 0 -5px 20px rgba(0,0,0,0.05); flex-shrink: 0; }
        .instrument-palette { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; }
        .inst-btn { 
            flex: 0 0 calc(33.333% - 10px); max-width: 140px; border: 3px solid transparent;

        }
        
        .inst-img { width: 60px; height: 60px; object-fit: contain; }
