<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ЗвероБэнд</title>
    <style>
        :root {
            --bg-color: #f1f5f9; --text-color: #1e293b; --card-bg: #ffffff;
            --inactive-opacity: 0.3; --color-kick: #ef4444; --color-cymbal: #eab308;
            --color-guitar: #3b82f6; --color-trumpet: #a855f7; --color-synth: #10b981;
        }
        * { box-sizing: border-box; touch-action: manipulation; }
        body {
            margin: 0; padding: 0; font-family: sans-serif;
            background-color: var(--bg-color); color: var(--text-color);
            display: flex; flex-direction: column; height: 100dvh; overflow: hidden;
        }
        /* ЭКРАН 1 */
        #screen-start {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: 100%; text-align: center; background: white;
        }
        .hero-showcase {
            width: 200px; height: 200px; margin: 20px; background: #f8fafc;
            border-radius: 40px; border: 4px solid #e2e8f0; display: flex; align-items: center; justify-content: center;
        }
        .hero-showcase img { width: 90%; height: 90%; object-fit: contain; }
        .btn-start {
            background: #3b82f6; color: white; border: none; padding: 15px 50px;
            border-radius: 30px; font-size: 20px; font-weight: bold; cursor: pointer;
        }
        .carousel-wrap { display: flex; align-items: center; gap: 10px; }
        .nav-btn { background: none; border: 2px solid #3b82f6; color: #3b82f6; border-radius: 50%; width: 40px; height: 40px; font-size: 20px; font-weight: bold; }
        /* ЭКРАН 2 */
        #screen-game { display: none; flex-direction: column; height: 100%; padding: 10px; }
        .top-controls { display: flex; justify-content: space-between; gap: 5px; margin-bottom: 5px; flex-shrink: 0; }
        .btn-play { background: #10b981; color: white; border: none; flex: 1; border-radius: 15px; font-weight: bold; }
        .btn-play.playing { background: #ef4444; }
        .grid-wrap { flex: 1; display: flex; flex-direction: column; justify-content: center; overflow: auto; padding: 10px 0; }
        .grid-section { display: flex; flex-direction: column; align-items: center; }
        .grid-row { display: flex; gap: 3px; margin-bottom: 3px; }
        .cell { width: 38px; height: 30px; background: white; border-radius: 6px; border: 1px solid #e2e8f0; }
        .cell-rhythm { height: 40px; border: 2px dashed #cbd5e1; border-radius: 10px; }
        .cell-active { box-shadow: inset 0 0 0 2px rgba(0,0,0,0.1); }
        .playhead { background: #e2e8f0 !important; }
        .bottom-stage { background: white; padding: 10px; border-radius: 20px 20px 0 0; box-shadow: 0 -5px 15px rgba(0,0,0,0.05); }
        .instrument-palette { display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; }
        .inst-btn { 
            flex: 0 0 calc(33% - 10px); border: 2px solid transparent; background: #f8fafc; 
            border-radius: 15px; padding: 5px; display: flex; flex-direction: column; align-items: center; 
        }
        .inst-btn.selected { background: white; border-color: inherit; transform: scale(1.05); }
        .inst-btn img { width: 45px; height: 45px; object-fit: contain; }
        .inst-btn span { font-size: 10px; font-weight: bold; margin-top: 3px; }
        @keyframes bounce { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.1) translateY(-5px); } }
        .bounce { animation: bounce 0.2s; }
    </style>
</head>
<body>
    <div id="screen-start">
        <h1>ЗвероБэнд 🎸</h1>
        <div class="carousel-wrap">
            <button class="nav-btn" onclick="changeHero(-1)">❮</button>
            <div class="hero-showcase"><img id="startImg" src=""></div>
            <button class="nav-btn" onclick="changeHero(1)">❯</button>
        </div>
        <h2 id="heroName"></h2>
        <button class="btn-start" onclick="startGame()">НАЧАТЬ ИГРУ</button>
    </div>

    <div id="screen-game">
        <div class="top-controls">
            <button class="btn-play" id="btnPlay" onclick="togglePlay()">▶ ИГРАТЬ</button>
            <button style="width:50px; border-radius:15px; border:none;" onclick="clearGrid()">🗑️</button>
        </div>
        <div class="grid-wrap">
            <div id="melGrid" class="grid-section"></div>
            <div style="height:4px; background:#cbd5e1; width:100%; margin:8px 0; border-radius:2px;"></div>
            <div id="rhyGrid" class="grid-section"></div>
        </div>
        <div class="bottom-stage"><div id="palette" class="instrument-palette"></div></div>
    </div>

    <script>
        const HEROES = [
            {id:'cat', name:'Кошечка'}, {id:'dog', name:'Щенок'},
            {id:'bear', name:'Мишка'}, {id:'fox', name:'Лисичка'}
        ];
        const INSTS = {
            guitar: {id:'guitar', type:'mel', img:'guitar', color:'#3b82f6', file:'guitar_base.wav'},
            trumpet: {id:'trumpet', type:'mel', img:'trumpet', color:'#a855f7', file:'trumpet_base.wav'},
            synth: {id:'synth', type:'mel', img:'synth', color:'#10b981', file:'synth_base.wav'},
            drum: {id:'kick', type:'rhy', img:'drum', color:'#ef4444', file:'kick.wav'},
            cymbals: {id:'cymbal', type:'rhy', img:'cymbals', color:'#eab308', file:'cymbal.wav'}
        };
        const RATES = [2.0, 1.68, 1.5, 1.33, 1.26, 1.12, 1.0];
        let state = { hero: 0, inst: 'guitar', grid: {}, rhy: {}, playing: false, step: 0, tempo: 120 };
        let audioCtx = null, buffers = {};

        function changeHero(dir) {
            state.hero = (state.hero + dir + HEROES.length) % HEROES.length;
            document.getElementById('startImg').src = `img/${HEROES[state.hero].id}_base.png`;
            document.getElementById('heroName').innerText = HEROES[state.hero].name;
        }

        async function startGame() {
            document.getElementById('screen-start').style.display = 'none';
            document.getElementById('screen-game').style.display = 'flex';
            const AudioContext = window.AudioContext || window.webkitAudioContext;
            audioCtx = new AudioContext();
            
            // Загрузка звуков не блокирует отрисовку
            Object.keys(INSTS).forEach(async k => {
                try {
                    const res = await fetch(`sounds/${INSTS[k].file}`);
                    const arrayBuffer = await res.arrayBuffer();
                    audioCtx.decodeAudioData(arrayBuffer, b => buffers[k] = b);
                } catch(e) {}
            });
            renderGame();
        }

        function renderGame() {
            const mel = document.getElementById('melGrid'), rhy = document.getElementById('rhyGrid');
            mel.innerHTML = rhy.innerHTML = '';
            for(let r=0; r<7; r++) {
                const row = document.createElement('div'); row.className = 'grid-row';
                for(let c=0; c<16; c++) {
                    const cell = document.createElement('div'); cell.className = 'cell'; cell.id = `m-${c}-${r}`;
                    cell.onclick = () => {
                        state.grid[c] = state.grid[c] || {};
                        if(state.grid[c][r]) { delete state.grid[c][r]; cell.style.background = ''; }
                        else { state.grid[c][r] = state.inst; cell.style.background = INSTS[state.inst].color; playSound(state.inst, RATES[r]); }
                    };
                    row.appendChild(cell);
                }
                mel.appendChild(row);
            }
            const rRow = document.createElement('div'); rRow.className = 'grid-row';
            for(let c=0; c<16; c++) {
                const cell = document.createElement('div'); cell.className = 'cell cell-rhythm'; cell.id = `r-${c}`;
                cell.onclick = () => {
                    if(state.rhy[c]) { delete state.rhy[c]; cell.style.background = ''; }
                    else { state.rhy[c] = state.inst; cell.style.background = INSTS[state.inst].color; playSound(state.inst, 1); }
                };
                rRow.appendChild(cell);
            }
            rhy.appendChild(rRow);
            renderPalette();
        }

        function renderPalette() {
            const p = document.getElementById('palette'); p.innerHTML = '';
            Object.keys(INSTS).forEach(k => {
                const btn = document.createElement('button'); btn.className = 'inst-btn'; btn.id = `btn-${k}`;
                if(state.inst === k && !state.playing) btn.classList.add('selected');
                btn.style.borderColor = INSTS[k].color;
                btn.onclick = () => { state.inst = k; document.querySelectorAll('.inst-btn').forEach(b => b.classList.remove('selected')); btn.classList.add('selected'); };
                btn.innerHTML = `<img src="img/${HEROES[state.hero].id}_${INSTS[k].img}.png"><span>${INSTS[k].img.toUpperCase()}</span>`;
                p.appendChild(btn);
            });
        }

        function playSound(k, r) {
            if(!buffers[k]) return;
            const s = audioCtx.createBufferSource(); s.buffer = buffers[k]; s.playbackRate.value = r;
            s.connect(audioCtx.destination); s.start();
            const b = document.getElementById(`btn-${k}`); if(b) { b.classList.remove('bounce'); void b.offsetWidth; b.classList.add('bounce'); }
        }

        function togglePlay() {
            state.playing = !state.playing;
            const b = document.getElementById('btnPlay');
            if(state.playing) { b.innerText = '■ СТОП'; b.classList.add('playing'); document.querySelectorAll('.inst-btn').forEach(x => x.classList.remove('selected')); loop(); }
            else { b.innerText = '▶ ИГРАТЬ'; b.classList.remove('playing'); state.step = 0; document.querySelectorAll('.cell').forEach(x => x.classList.remove('playhead')); renderPalette(); }
        }

        function loop() {
            if(!state.playing) return;
            document.querySelectorAll('.cell').forEach(x => x.classList.remove('playhead'));
            for(let r=0; r<7; r++) document.getElementById(`m-${state.step}-${r}`).classList.add('playhead');
            document.getElementById(`r-${state.step}`).classList.add('playhead');
            if(state.grid[state.step]) Object.keys(state.grid[state.step]).forEach(r => playSound(state.grid[state.step][r], RATES[r]));
            if(state.rhy[state.step]) playSound(state.rhy[state.step], 1);
            state.step = (state.step + 1) % 16;
            setTimeout(loop, (60000/state.tempo)/4);
        }

        function clearGrid() { state.grid = {}; state.rhy = {}; document.querySelectorAll('.cell').forEach(x => { x.style.background = ''; x.classList.remove('cell-active'); }); }
        
        changeHero(0);
    </script>
</body>
</html>
